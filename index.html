<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFlow — Votre Coach Wellness</title>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-top">
                <div>
                    <h1>HI, EXCEL !</h1>
                    <p>WHAT FOOD YOU WANT TO COOK?</p>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="search-bar" placeholder="🔍Search recipes...">
            </div>
        </header>

        <section class="categories-filter">
            <button class="chip active">All</button>
            <button class="chip">Breakfast</button>
            <button class="chip">Dessert</button>
            <button class="chip">Appetizers</button>
        </section>

        <main id="recipe-grid">
            </main>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Chargement des recettes...</p>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active">🏠 <span>Home</span></button>
            <button class="nav-item">❤️ <span>Favorites</span></button>
            <button class="nav-item">👤 <span>Profile</span></button>
        </nav>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
